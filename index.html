<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
</head>
<body>

  <h2>Star Wars</h2>
  <button onclick="buscarStarWars()">Buscar Personagem</button>
  <div id="starwars"></div>

  <h2>Rick and Morty</h2>
  <button onclick="buscarRick()">Buscar Personagem</button>
  <div id="rick"></div>

  <h2>Harry Potter</h2>
  <button onclick="buscarHP()">Buscar Personagem</button>
  <div id="hp"></div>

  <script>
    function buscarStarWars() {
      fetch('https://swapi.dev/api/people/1/')
        .then(res => res.json())
        .then(data => {
          document.getElementById('starwars').innerHTML = `
            <p><strong>Nome:</strong> ${data.name}</p>
            <p><strong>Altura:</strong> ${data.height}</p>
            <p><strong>Peso:</strong> ${data.mass}</p>
            <p><strong>Gênero:</strong> ${data.gender}</p>
          `;
        });
    }

    function buscarRick() {
      fetch('https://rickandmortyapi.com/api/character/1')
        .then(res => res.json())
        .then(data => {
          document.getElementById('rick').innerHTML = `
            <p><strong>Nome:</strong> ${data.name}</p>
            <p><strong>Status:</strong> ${data.status}</p>
            <p><strong>Espécie:</strong> ${data.species}</p>
            <p><strong>Gênero:</strong> ${data.gender}</p>
          `;
        });
    }

    function buscarHP() {
      fetch('https://hp-api.onrender.com/api/characters')
        .then(res => res.json())
        .then(data => {
          let personagem = data[0];
          document.getElementById('hp').innerHTML = `
            <p><strong>Nome:</strong> ${personagem.name}</p>
            <p><strong>Casa:</strong> ${personagem.house}</p>
            <p><strong>Espécie:</strong> ${personagem.species}</p>
            <p><strong>Ator:</strong> ${personagem.actor}</p>
          `;
        });
    }
  </script>

</body>
</html>
