<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consumo de APIs</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f2f2f2;
}

header{
    background:#9c0000;
    color:white;
    padding:15px;
    text-align:center;
}

section{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 5px gray;
}

button{
    padding:10px;
    margin:10px 0;
}

.card{
    border:1px solid #ccc;
    padding:10px;
    margin:5px;
}
</style>

</head>
<body>

<header>
<h1>Consumo de APIs</h1>
</header>


<section>

<h2>Posts (JSONPlaceholder)</h2>

<button onclick="carregarPosts()">Carregar Post</button>

<div id="posts"></div>

</section>




<section>

<h2>Usuario Aleatorio</h2>

<button onclick="carregarUsuario()">Gerar Usuario</button>

<div id="usuario"></div>

</section>




<section>

<h2>Pokemon</h2>

<button onclick="carregarPokemon()">Mostrar Pokemon</button>

<div id="pokemon"></div>

</section>




<script>




function carregarPosts(){

fetch("https://jsonplaceholder.typicode.com/posts")

.then(res => res.json())

.then(dados => {

let div = document.getElementById("posts")

div.innerHTML = ""

dados.slice(0,5).forEach(post => {

div.innerHTML += `
<div class="card">
<h3>${post.title}</h3>
<p>${post.body}</p>
</div>
`
})
})
}

///

function carregarUsuario(){

fetch("https://randomuser.me/api/")

.then(res => res.json())

.then(dados => {

let user = dados.results[0]

let div = document.getElementById("usuario")

div.innerHTML = `
<div class="card">
<img src="${user.picture.large}">
<p>Nome: ${user.name.first}</p>
<p>Email: ${user.email}</p>
</div>
`

})

}

///

function carregarPokemon(){

fetch("https://pokeapi.co/api/v2/pokemon/pikachu")

.then(res => res.json())

.then(pokemon => {

let div = document.getElementById("pokemon")

div.innerHTML = `
<div class="card">
<h3>${pokemon.name}</h3>
<img src="${pokemon.sprites.front_default}">
<p>Altura: ${pokemon.height}</p>
</div>
`

})

}



</script>


</body>
</html>
